name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build User Service Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service ./user-service

    - name: Build Product Service Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service ./product-service

    - name: Push User Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/user-service

    - name: Push Product Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/product-service
