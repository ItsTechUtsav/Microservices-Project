apiVersion : apps/v1
kind : Deployment
metadata:
  name : product-service
  labels:
    app : product-service
spec:
  replicas : 2
  selector:
    matchLabels:
      app : product-service
  template:
    metadata:
      labels:
        app : product-service
    spec:
      containers:
        - name : product-service
          image : microservices-product-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort : 8002
